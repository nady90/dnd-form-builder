name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    environment: default
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env: # 👈 job-level env
      CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{vars.CLERK_SECRET_KEY}}
      E2E_CLERK_USER_USERNAME: ${{vars.E2E_CLERK_USER_USERNAME}}
      E2E_CLERK_USER_PASSWORD: ${{vars.E2E_CLERK_USER_PASSWORD}}
      DATABASE_URL: ${{vars.DATABASE_URL}}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start dev server
        run: npm run dev -- -p 3000 &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000

      - name: Run Playwright tests
        run: |
          npx wait-on http://localhost:3000
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-artifacts
          path: test-results/
